version: 0.2

phases:

  pre_build:
    commands:
      - echo Logging into Amazon ECR
      - aws ecr get-login-password --region ap-south-1 | docker login --username AWS --password-stdin 541804384422.dkr.ecr.ap-south-1.amazonaws.com

  build:
    commands:
      - echo Building Docker image
      - docker build -t myimage .

  post_build:
    commands:
      - echo Tagging Docker image
      - docker tag myimage:latest 541804384422.dkr.ecr.ap-south-1.amazonaws.com/myimage:latest

      - echo Pushing Docker image
      - docker push 541804384422.dkr.ecr.ap-south-1.amazonaws.com/myimage:latest
